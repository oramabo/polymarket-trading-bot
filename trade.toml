strategy = "trade_2"
trade_usd = 5
max_retries = 3

[market]
market_coins = ["btc", "eth", "sol", "xrp"]
market_period = "15" # default period: 15 / 60 / 240 / 1440
btc_period = "5"     # BTC supports 5m markets

[trade_1]
entry_price_range = [0.4, 0.6]
swap_price_range = [0.0, 0.8]
take_profit = 2.0
stop_loss = 0.5
exit_time_ratio = 0.95
exit_price_ratio = 0.98

[trade_2]
entry_price_ratio = [0.2, 0.95]
entry_time_ratio = 0.4
max_entry_time_ratio = 0.85
exit_price_ratio_range = [[1.0, 1.0], [1.0, 1.0]]
emergency_swap_price = [1.0, 1.0]
trailing_stop_pct = 0.15
stop_loss_pct = 0.30
take_profit_ratio = 0.80
min_signal_strength = 0.3
position_scale = true
allow_reentry = false
max_reentries = 2
